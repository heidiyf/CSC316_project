<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olympic Sports Park</title>
  <!--
    sportpark.js is fully self-contained.
    It builds the page, loads the CSV, and renders everything on its own.
    All you need here is D3 loaded before it.

    To merge other team visualizations later, just add their
    <script> tags below this one. Each module handles its own section.
  -->
</head>
<body>
  <!-- D3 v7 (required by sportpark.js) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>

  <!-- Sports Park visualization — fully self-contained -->
  <script src="sportpark.js"></script>

  <!--
    Other team member visualizations go here, e.g.:
    <script src="swimming.js"></script>
    <script src="medals_timeline.js"></script>
  -->
</body>
</html>
