<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>US vs China Medal Race Scale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --usa: #3b82f6;
      --chn: #ef4444;
      --gold: #e3bf5d;
      --silver: #d9e0eb;
      --bronze: #cf8a4c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 16%, var(--glow-a), transparent 24%),
        radial-gradient(circle at 82% 10%, var(--glow-b), transparent 28%),
        linear-gradient(180deg, var(--page-top) 0%, var(--page-bottom) 100%);
      transition: background .42s ease, color .3s ease;
    }

    body.mode-total {
      --page-top: #050913;
      --page-bottom: #17111a;
      --glow-a: rgba(59, 130, 246, 0.34);
      --glow-b: rgba(239, 68, 68, 0.3);
      --ink: #f8fbff;
      --muted: #c4d1e5;
      --panel-bg: rgba(8, 13, 24, 0.84);
      --panel-alt: rgba(28, 20, 30, 0.82);
      --shell-bg: rgba(8, 10, 21, 0.94);
      --accent: #dfe8f6;
      --accent-soft: #65b9ff;
      --accent-deep: #ff6170;
      --accent-glow: rgba(117, 164, 255, 0.26);
      --ghost-bg: rgba(255, 255, 255, 0.08);
      --sheen: rgba(255, 255, 255, 0.08);
      --shadow: rgba(0, 0, 0, 0.36);
      --active-ink: #09101d;
    }

    body.mode-gold {
      --page-top: #120d05;
      --page-bottom: #2c1a07;
      --glow-a: rgba(243, 202, 96, 0.36);
      --glow-b: rgba(161, 101, 17, 0.24);
      --ink: #fff7e2;
      --muted: #efdba6;
      --panel-bg: rgba(36, 23, 6, 0.8);
      --panel-alt: rgba(60, 39, 10, 0.78);
      --shell-bg: rgba(20, 12, 2, 0.92);
      --accent: #efcb6d;
      --accent-soft: #fff2b5;
      --accent-deep: #a96e14;
      --accent-glow: rgba(239, 203, 109, 0.34);
      --ghost-bg: rgba(255, 244, 211, 0.08);
      --sheen: rgba(255, 240, 194, 0.12);
      --shadow: rgba(0, 0, 0, 0.4);
      --active-ink: #261604;
    }

    body.mode-silver {
      --page-top: #0c121a;
      --page-bottom: #1d2734;
      --glow-a: rgba(213, 221, 232, 0.24);
      --glow-b: rgba(133, 146, 165, 0.22);
      --ink: #f6f9fd;
      --muted: #ccd5e2;
      --panel-bg: rgba(17, 24, 35, 0.8);
      --panel-alt: rgba(33, 43, 58, 0.78);
      --shell-bg: rgba(11, 17, 26, 0.92);
      --accent: #dbe3ee;
      --accent-soft: #f6fbff;
      --accent-deep: #8b99ad;
      --accent-glow: rgba(219, 227, 238, 0.28);
      --ghost-bg: rgba(246, 251, 255, 0.08);
      --sheen: rgba(255, 255, 255, 0.12);
      --shadow: rgba(0, 0, 0, 0.38);
      --active-ink: #121922;
    }

    body.mode-bronze {
      --page-top: #140c08;
      --page-bottom: #32180f;
      --glow-a: rgba(211, 138, 76, 0.32);
      --glow-b: rgba(122, 53, 21, 0.24);
      --ink: #fff1e8;
      --muted: #e8c7b0;
      --panel-bg: rgba(33, 18, 12, 0.8);
      --panel-alt: rgba(58, 28, 18, 0.78);
      --shell-bg: rgba(20, 10, 7, 0.92);
      --accent: #d79258;
      --accent-soft: #ffd1aa;
      --accent-deep: #8d4c26;
      --accent-glow: rgba(215, 146, 88, 0.3);
      --ghost-bg: rgba(255, 230, 214, 0.08);
      --sheen: rgba(255, 214, 189, 0.11);
      --shadow: rgba(0, 0, 0, 0.4);
      --active-ink: #24120a;
    }

    .page {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px 18px 28px;
      display: grid;
      gap: 16px;
    }

    .control-panel,
    .viz-shell {
      background: linear-gradient(160deg, var(--panel-bg) 0%, var(--panel-alt) 100%);
      box-shadow: 0 28px 60px var(--shadow), inset 0 1px 0 var(--sheen);
    }

    .control-panel {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 28px;
    }

    .control-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
    }

    .filter-row {
      display: grid;
      gap: 10px;
    }

    .filter-label,
    .status {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .filter-pills,
    .playback {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .playback {
      justify-content: flex-end;
    }

    .btn,
    .speed,
    .filter-pill {
      appearance: none;
      border: 0;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
    }

    .btn,
    .speed {
      padding: 11px 16px;
    }

    .btn {
      cursor: pointer;
      text-transform: uppercase;
      color: var(--active-ink);
      background: linear-gradient(135deg, var(--accent-soft) 0%, var(--accent) 52%, var(--accent-deep) 100%);
      box-shadow: 0 16px 28px var(--accent-glow);
    }

    .btn.secondary,
    .speed,
    .filter-pill {
      color: var(--ink);
      background: var(--ghost-bg);
      box-shadow: inset 0 1px 0 var(--sheen);
    }

    .filter-pill {
      cursor: pointer;
      padding: 10px 14px;
      color: var(--muted);
    }

    .filter-pill.is-active {
      color: var(--active-ink);
      background: linear-gradient(135deg, var(--accent-soft) 0%, var(--accent) 52%, var(--accent-deep) 100%);
      box-shadow: 0 16px 28px var(--accent-glow);
    }

    .btn:hover,
    .filter-pill:hover,
    .speed:hover {
      transform: translateY(-1px);
    }

    .scrub-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 14px;
      align-items: center;
    }

    input[type=range] {
      width: 100%;
      accent-color: var(--accent);
      filter: drop-shadow(0 0 12px var(--accent-glow));
    }

    .year-readout {
      min-width: 92px;
      text-align: right;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: -.04em;
      color: var(--accent);
    }

    .headline-strip {
      color: var(--ink);
      font-size: 22px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: -.03em;
    }

    .statline {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .caption {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .viz-shell {
      position: relative;
      overflow: hidden;
      padding: 16px 16px 8px;
      border-radius: 32px;
      background: linear-gradient(180deg, var(--shell-bg) 0%, var(--panel-alt) 100%);
    }

    .viz-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 18%, var(--accent-glow), transparent 30%),
        radial-gradient(circle at 18% 78%, var(--glow-a), transparent 28%),
        radial-gradient(circle at 82% 74%, var(--glow-b), transparent 28%);
      pointer-events: none;
      opacity: .85;
    }

    .viz {
      position: relative;
      z-index: 1;
      width: 100%;
      overflow: auto;
    }

    .viz svg { display: block; }

    .tt {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(6, 10, 18, 0.95);
      color: #fff;
      font-size: 12px;
      line-height: 1.4;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.28);
      opacity: 0;
      transform: translate(-50%, -112%);
    }

    .tt .k { color: #d0d5dd; }

    @media (max-width: 900px) {
      .control-top,
      .scrub-row {
        grid-template-columns: 1fr;
      }

      .playback {
        justify-content: flex-start;
      }

      .year-readout {
        text-align: left;
      }
    }
  </style>
</head>
<body class="mode-total">
  <div class="page">
    <section class="control-panel">
      <div class="control-top">
        <div class="filter-row">
          <div class="filter-label">Race Filter</div>
          <div id="raceModeFilters" class="filter-pills">
            <button class="filter-pill gold-filter-btn is-active" type="button" data-mode="Total">Total medals</button>
            <button class="filter-pill gold-filter-btn" type="button" data-mode="Gold">Gold medals</button>
            <button class="filter-pill gold-filter-btn" type="button" data-mode="Silver">Silver medals</button>
            <button class="filter-pill gold-filter-btn" type="button" data-mode="Bronze">Bronze medals</button>
          </div>
        </div>
        <div class="playback">
          <button id="playPauseBtn" class="btn" type="button">Pause</button>
          <button id="restartBtn" class="btn secondary" type="button">Restart</button>
          <select id="speedSelect" class="speed" aria-label="Autoplay speed">
            <option value="1300">Slow</option>
            <option value="850" selected>Normal</option>
            <option value="500">Fast</option>
          </select>
        </div>
      </div>

      <div class="scrub-row">
        <input id="rivalYearSlider" type="range" />
        <div class="year-readout" id="rivalYearLabel">—</div>
        <div class="status" id="playStateText">Autoplay on</div>
      </div>

      <div id="raceModeHeadline" class="headline-strip">USA and China medal race</div>
      <div id="raceModeSubline" class="statline">Event-medal basis for USA and China.</div>
      <div id="raceModeSummary" class="caption">Autoplay will pause briefly at key rivalry years.</div>
    </section>

    <section class="viz-shell">
      <div id="viz4" class="viz"></div>
    </section>
  </div>

  <div id="tooltip" class="tt"></div>
  <script src="scale_visual.js"></script>
</body>
</html>
