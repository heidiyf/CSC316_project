<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Swimming Visualization Test</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="swimming3.0.js"></script>

<style>

body{
    margin:40px;
    font-family:Arial, Helvetica, sans-serif;
    background:#020817;
    color:white;
}

h1{
    margin-bottom:20px;
}

.controls{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:10px;
}

#yearSlider{
    width:300px;
}

#swimYearLabel{
    font-size:20px;
    font-weight:bold;
}

#gapText{
    margin-bottom:15px;
}

.poolContainer{
    margin-top:20px;
}

.pool{
    width:100%;
    margin-top:10px;
}

.swim-story-break{
    margin-top:28px;
    padding-top:22px;
    border-top:1px solid rgba(148,163,184,0.22);
}

.swim-story-break h2{
    margin:0 0 8px;
    font-size:24px;
}

.swim-story-break p{
    margin:0 0 16px;
    color:#cbd5e1;
}

</style>

</head>


<body>

<h1>Swimming Medal Comparison</h1>

<div class="controls">
<label>Year</label>
<input id="yearSlider" type="range">
<span id="swimYearLabel"></span>
</div>

<p id="gapText"></p>

<div id="swimUSALabel"></div>
<div id="swimUSA" class="pool"></div>

<!-- comparison bar -->
<div id="swimCompareBar"></div>

<div id="swimCHNLabel"></div>
<div id="swimCHN" class="pool"></div>

<section class="swim-story-break">
  <h2>Paris 2024 classic finals</h2>
  <p>These direct USA-China finals show who touched first in Paris. Lower time wins, and the swimmer placed closest to the finish wall is the faster finalist.</p>
  <div id="parisFinalsControls"></div>
  <div id="parisFinalsHeadToHead"></div>
</section>


<script>

d3.csv("data/olympics_dataset_cleaned.csv").then(data => {

    data.forEach(d=>{
        d.Year = +d.Year
    })

    console.log("data loaded",data)

    renderSwimmingPools(data)

})

</script>


</body>
</html>
